# =================
# == Permissions ==
# =================
#
# While you can use this file for such, it is recommended that use the permission guide wiki here on GitHub. 
#    You can find it here: https://github.com/Etanarvazac/TempFly_XCraft/wiki/Permissions-&-Commands
#
# This file has all the permissions for TempFly. Descriptions are provided and all permissions are sorted out 
#    by who we recommend should have what permission (player, staff, admin, or op). However, you may choose
#    how you wish to give them for your server. Each list is also sorted from A-Z for easier reading. 
#
# Trails require either an EFFECT or PARTICLE type, depending on what version your server is running.
#    Effects (1.8 and earlier): https://helpch.at/docs/1.8/org/bukkit/Effect.html
#    Particles (1.9 and later): https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Particle.html
#
# Line | Category
# =====|===========================
#   11 | Player Permissions
#   55 | Staff Permissions
#   -- | Admin or OP Permisiions
#   -- | Other Permissions


# == PLAYER PERMISSIONS ==
# These are okay to give to every-day players.
tempfly.help:
  desc: Allow user to see the help page.
  default: not-op
  command: /tf help

tempfly.pay:
  desc: Allow user to pay another player time.
  default: not-op
  command: /tf pay [player]

tempfly.speed.self:
  desc: Allows user to set their fly speed.
  command: /tf speed [speed]

# --- DISCLAIMER --- This is a beta feature which may not work yet.
tempfly.time.display:
  desc: Allows user to use the display command
  default: not-op
  command: /tf display

# --- DISCLAIMER --- This is a beta feature which may not work yet.
tempfly.time.display.self:
  desc: Allow user to show/hide their own timer above the action bar.
  default: not-op

tempfly.time.self:
  desc: Allow user to view thier remaining time.
  default: not-op
  command: /tf time

tempfly.toggle.self:
  desc: Allows user to toggle the use of temp flight.
  default: not-op
  command:
    -/tempfly
    -/fly
    -/tf
  
tempfly.trails:
  desc: Allow user access to the praticle trail gui
  command: /tf trails

tempfly.trails.set.self:
  desc: Allow user to set their trail with command.
  command: /tf trail {player} {trail}

tempfly.trails.remove.self:
  desc: Allow user to remove their trail.
  default: not-op

tempfly.shop:
  desc: Allow user to open the tempfly shop
  default: not-op
  command: /tf shop


# == STAFF PERMISSIONS ==
# These can be used by your staff team. Any permission listed under a wildcard can be assigned with the
#    wildcard or using the permission(s) themselves. You don't need to apply both for them to work. We
#    do recommend that staff are not limited by fly time to better aid in helping track rule breakers.
tempfly.infinite:
  desc:
    - Infinite flight. This simply will not charge the player flight time for flying.
    - However, they will still have their actual time balance stored in the background. They dont lose it.
    - IT DOES NOT let them pay infinite time to other players.
    - In addition it does not affect their max_time, they are completely seperate things.

tempfly.infinite.toggle:
  desc: Allow the user to toggle their infinite flight.
    
tempfly.speed.*:
  desc: Allows setting fly speed for self and others. Also grants region and world speed settings.
  children:
    tempfly.speed.self: true
    tempfly.speed.other: true

tempfly.speed.other:
  desc: Allows user to set another users fly speed.
  command: /tf speed [speed] [player]

tempfly.time.*:
  desc: Allows viewing remaining fly time for self and others.
  children:
    tempfly.time.self: true
    tempfly.time.other: true

# --- DISCLAIMER --- This is a beta feature which may not work yet.
tempfly.time.display.other:
  desc: Allows user to show/hide another players actionbar timer.
  
tempfly.time.other:
  desc: Allow user to view another players remaining time.
  command: /tf time [player]
    
tempfly.toggle.*:
  desc: Allows toggling flight for both self and others.
  children:
    tempfly.toggle.self: true
    tempfly.toggle.other: true

tempfly.toggle.other:
  desc: Allows user to toggle anothers use of temp flight.
  command: /tf toggle [player]

tempfly.trails.remove.other:
  desc: Allow user to remove another players trail.

tempfly.trails.set.other:
  desc: Allow user to set another players trail with command.
  command: /tf trail {player} {trail}


# == ADMIN OR OPPED PERMISSIONS ==
# These are recommended tor your admins and/or opped players. When it comes to settings another
#    player's fly time (or give/take), we recommend admins or higher to prevent potential abuse. If
#    you know your team will not abuse these, you are welcome to give those permissions to your staff.
tempfly.admin:
  desc: Grants user all admin commands.
  children:
    tempfly.help.admin: true
    tempfly.reload: true
    tempfly.bypass: true
    tempfly.bypass.toggle: true
    tempfly.infinity.toggle: true
    tempfly.bonus.[group]: true
    tempfly.max.[group]: true

tempfly.bypass:
  desc: Allow the user to bypass flight requirements.

tempfly.bypass.toggle:
  desc: Allow the user to toggle their tempfly bypass.
  
tempfly.help.admin:
  desc: Allow user to see the help page with admin commands.
  command: /tf help
    
tempfly.give:
  desc: Allow user to give time. valid arguments; [s {secs}] [m {mins}] [h {hours}] [d {days}]
  command: /tf give [player] [amount]

tempfly.giveall:
  desc: Gives all users currently online additional fly time. Valid arguments; [s {secs}] [m {mins}] [h {hours}] [d {days}]
  command: /tf giveall [player] [amount]

tempfly.set.*:
  desc: Allows user to give, remove, and set all fly times.
  children:
    tempfly.give: true
    tempfly.giveall: true
    tempfly.remove: true
    tempfly.set: true

tempfly.set:
  desc: Allow user to set time. valid arguments; [s {secs}] [m {mins}] [h {hours}] [d {days}]
  command: /tf set [player] [amount]

tempfly.reload:
  desc: Reloads the plugins configs and settings.
  command: /tf reload

tempfly.remove:
  desc: Allow user to remove time. Valid arguments; [s {secs}] [m {mins}] [h {hours}] [d {days}]
  command: /tf remove [player] [amount]


# == OTHER PERMISSIONS ==
# Any other available commands or permissions you can grand. Note that the last 5 in this list are soley
#    for permissioning and there is no command that may change their values.
tempfly.*:
  desc: Grants users all TempFly permissions
  default: op
  children:
    tempfly.admin: true
    tempfly.infinite: true
    tempfly.set.*: true
    tempfly.speed.*: true
    tempfly.time.*: true
    tempfly.toggle.*: true
    tempfly.trails.*: true
  
tempfly.bonus.[group]:
  desc: Gives user the bonus defined for this group in the config daily.

tempfly.max.[group]:
  desc: Define the users max time. These groups should be set in the config under max_time.

tempfly.speed.region.[region_name].[speed]:
  desc: Define the users max fly speed for a world. goes up to 10.

tempfly.speed.world.[world_name].[speed]:
  desc: Define the users max fly speed for a region. goes up to 10. Takes priority over world speed.
  
tempfly.trail.[particle]: 
  desc: Gives user access to use individual trails.

